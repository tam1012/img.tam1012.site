name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 158.178.239.119
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/img-studio

            # First run: clone repo
            if [ ! -d ".git" ]; then
              cd ~
              git clone https://github.com/tam1012/img.tam1012.site.git img-studio
              cd ~/img-studio
            fi

            git pull origin main
            docker compose build --no-cache app
            docker compose up -d

            echo "Deploy complete"
